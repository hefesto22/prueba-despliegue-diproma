services:

  mysql:
    image: mysql:8.0
    container_name: distribuidora_hozana_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: sistema_diproma
      MYSQL_USER: diproma_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - distribuidora_hozana_mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: distribuidora_hozana_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - distribuidora_hozana_redis:/data

volumes:
  distribuidora_hozana_mysql:
  distribuidora_hozana_redis:
